# ===============================
# Service configuration
# ===============================
spring.application.name=PRODUCT-SERVICE
server.port=8081

# ===============================
# Eureka client configuration
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ===============================
# Database configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/productservicedb
spring.datasource.username=productservice
spring.datasource.password=S2011nppd

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=true

# ===============================
# Product provider config
# ===============================
product.read.provider=self
# possible values: fakestore | self

# External API (this is OK ? not a microservice)
fakestore.api.url=https://fakestoreapi.com/products

# ===============================
# Redis configuration
# ===============================
spring.redis.host=localhost
spring.redis.port=6379

# Enable Spring Cache with Redis
spring.cache.type=redis

# ===============================
# Elasticsearch (disabled)
# ===============================
#spring.elasticsearch.uris=http://localhost:9200
